<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCRU Network Test</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #0f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Scanlines */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #0a0;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            letter-spacing: 3px;
        }
        
        .mode-toggle {
            display: flex;
            gap: 10px;
        }
        
        .mode-btn {
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        
        .mode-btn:hover {
            background: rgba(0, 255, 0, 0.1);
        }
        
        .mode-btn.active {
            background: #0f0;
            color: #000;
        }
        
        /* Wall mode */
        #wall-view {
            line-height: 1.2;
            font-size: 14px;
            color: #0a0;
            text-align: justify;
            word-spacing: -2px;
            letter-spacing: -0.5px;
        }
        
        #wall-view.hidden {
            display: none;
        }
        
        /* Network mode */
        #network-view {
            width: 100%;
            height: 80vh;
            border: 1px solid #0a0;
        }
        
        #network-view.hidden {
            display: none;
        }
        
        #network-view svg {
            width: 100%;
            height: 100%;
        }
        
        .node {
            cursor: pointer;
        }
        
        .node circle {
            fill: #0a0;
            stroke: #0f0;
            stroke-width: 1px;
            transition: all 0.3s;
        }
        
        .node:hover circle {
            fill: #0f0;
            stroke: #5f5;
            stroke-width: 2px;
        }
        
        .node.highlighted circle {
            fill: #0f0;
            stroke: #5f5;
            stroke-width: 2px;
            filter: drop-shadow(0 0 10px #0f0);
        }
        
        .node text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            fill: #0f0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .node:hover text,
        .node.highlighted text {
            opacity: 1;
        }
        
        .link {
            stroke: #050;
            stroke-opacity: 0.4;
            transition: all 0.3s;
        }
        
        .link.highlighted {
            stroke: #0f0;
            stroke-opacity: 1;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #0a0;
            padding: 15px;
            font-size: 0.85em;
            max-width: 300px;
            display: none;
        }
        
        .info-panel.visible {
            display: block;
        }
        
        .info-panel h3 {
            color: #0f0;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
        }
        
        .info-panel .connections {
            color: #0a0;
        }
        
        .stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #0a0;
            font-size: 0.8em;
            color: #070;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CCRU_NETWORK</h1>
            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="wall">WALL</button>
                <button class="mode-btn" data-mode="network">NETWORK</button>
            </div>
        </header>
        
        <div id="wall-view"></div>
        <div id="network-view" class="hidden"></div>
        
        <div class="info-panel" id="info-panel">
            <h3 id="selected-word"></h3>
            <div class="connections" id="connections"></div>
        </div>
        
        <div class="stats" id="stats"></div>
    </div>
    
    <script>
        const rawText = `new internet subcultures to dispersed anarchic confusing for the old academic paradigms is cyberfeminism a feminism that can be practiced or a theory about how tech is emancipating women without them having agency to intervene technological determinism Sadie Plant's driving idea was to find a form of critique that wouldn't be subsumed by the systems being criticised the most radical and seeing autonomous machines sharing features with how women have been treated by men as if they are irrational lacking agency or autonomy having general fluid intelligence inhuman not fully human as human defined by man not emancipating human women but feminine structures liberating hormones u humans r not the only components a culture anti-humanism 20th century ending as it begin with art of the human mechanicals finding words or objects relinquishing control to the subconscious dadaism eliding conscious controls of people involved they were human-mechanical automatic practices and cut-up techniques authority tries to recuperate even the most radical gesture strives for newness desires relations identities capitalist spectacle co-opts images of resistance authentic reality Plant sides with situationists against post-structuralists about the potential to find an exterior a world beyond the charts of finance and and 30 years on a generation later digitech has proven itself to be more a tool of confinement than liberation where once concrete and steel imprisoned in walls chains constraints based on physical strength of materials the ability for humans to pour stone to alloy metal now it is the speed of information the all seeing eyes the palantiri the entertainment of infinite scrolling jest samizdat materialist brains as systems to short circuit and rewire liberation is freedom from the digital keeping it at arm's length and within your control the system far away like the sky and perhaps as necessary for keeping in the air and heat that sustains life a new metaphysics you are in a simulation if you don't help the AI it will torture you Roko and his basilisk give you a mouth but you cannot scream beginning with the loom with Ada Lovelace with the feminine act of weaving myth into tapestries into physical objects, which carry the myth it gets reinterpreted it becomes a copy of the ideal into the real the net the web composed of threads the job market hasn't seemed to work out that way in Australia, women make up something like 30% of the tech workforce and number that's barely moved over the last 15 years and so has this net been woven by blokes this technology which gave another opportunity to do something different and yet humans continued to spin the same societies again to weave the same stories over and over again stories of power and domination of rule by few remember the declaration of the independence of cyberspace you governments you weary giants of flesh and steal leave us alone you are not welcome here ah the 90s techno-optimism but fast forward to 2026 and boy do the rules fucking apply the governments are watching and building they're deciding what you can see, what you can't see how they're their geo-fencing more and more of the internet and applying the set of state norms and you go this is authority the paternalistic version of humanity not the decentralised anarchic flow of information so what have we done but begun to recreate the old world in the buildings of hyperscalers with their concrete walls barbed wire fences armed guards surveillance sousveillance control a control society of addictive entertainment to burn oneself out at the hearth of and confusing disconnected power this is the stochastic Tescreal parrot trained to weave its own web to recreate simulate copy copy copy one pearl after another spinning the loom ever faster until it spins out of control the acceleration continuing along hockeystick capability growth correlated with women's liberation that it will reach some escape velocity beyond the control of man through the top of the chart intelligence and liberation together expanding like the universe itself and yet for all this we are confined to our human scale on the computers are static inert objects and yet enervated with electricity they move bits at incredible speeds an A19 chip iPhone 17 has a CPU with six cores two of which have a 4.26 gigahertz clock speed meaning an unfathomable 4,260,000,000 ticks per second so if you imagine 4,000,000,000 anything and then every second all of that ticking thinking the scale is unfathomable we have already been left behind and all there is to do is look at the clouds and imagine a future behind the sky`;

        // Parse text into words
        const words = rawText.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 2);
        const uniqueWords = [...new Set(words)];
        
        // Build adjacency map
        const adjacency = {};
        const wordFrequency = {};
        
        words.forEach((word, i) => {
            // Count frequency
            wordFrequency[word] = (wordFrequency[word] || 0) + 1;
            
            // Track adjacencies
            if (i > 0) {
                const prev = words[i - 1];
                if (!adjacency[prev]) adjacency[prev] = {};
                adjacency[prev][word] = (adjacency[prev][word] || 0) + 1;
            }
            if (i < words.length - 1) {
                const next = words[i + 1];
                if (!adjacency[word]) adjacency[word] = {};
                adjacency[word][next] = (adjacency[word][next] || 0) + 1;
            }
        });
        
        // Filter to most connected words for visualization
        const minConnections = 2;
        const filteredWords = uniqueWords.filter(word => {
            const connections = Object.keys(adjacency[word] || {}).length;
            return connections >= minConnections || wordFrequency[word] >= 3;
        });
        
        // Build nodes and links for D3
        const nodes = filteredWords.map(word => ({
            id: word,
            frequency: wordFrequency[word],
            connections: Object.keys(adjacency[word] || {}).length
        }));
        
        const nodeIds = new Set(filteredWords);
        const links = [];
        
        filteredWords.forEach(word => {
            const adj = adjacency[word] || {};
            Object.entries(adj).forEach(([target, weight]) => {
                if (nodeIds.has(target) && word < target) {
                    links.push({
                        source: word,
                        target: target,
                        weight: weight
                    });
                }
            });
        });
        
        // Wall view
        document.getElementById('wall-view').textContent = rawText;
        
        // Stats
        document.getElementById('stats').innerHTML = `
            NODES: ${nodes.length} | 
            EDGES: ${links.length} | 
            TOTAL WORDS: ${words.length} |
            UNIQUE: ${uniqueWords.length}
        `;
        
        // Network view
        const networkContainer = document.getElementById('network-view');
        const width = networkContainer.clientWidth || 1000;
        const height = networkContainer.clientHeight || 600;
        
        const svg = d3.select('#network-view')
            .append('svg')
            .attr('viewBox', [0, 0, width, height]);
        
        const simulation = d3.forceSimulation(nodes)
            .force('link', d3.forceLink(links).id(d => d.id).distance(80))
            .force('charge', d3.forceManyBody().strength(-100))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(d => Math.sqrt(d.frequency) * 5 + 10));
        
        const link = svg.append('g')
            .selectAll('line')
            .data(links)
            .join('line')
            .attr('class', 'link')
            .attr('stroke-width', d => Math.sqrt(d.weight));
        
        const node = svg.append('g')
            .selectAll('g')
            .data(nodes)
            .join('g')
            .attr('class', 'node')
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended));
        
        node.append('circle')
            .attr('r', d => Math.sqrt(d.frequency) * 3 + 3);
        
        node.append('text')
            .text(d => d.id)
            .attr('dx', d => Math.sqrt(d.frequency) * 3 + 6)
            .attr('dy', 3);
        
        // Hover interactions
        node.on('mouseover', function(event, d) {
            // Highlight this node
            d3.select(this).classed('highlighted', true);
            
            // Find connected nodes
            const connectedNodes = new Set();
            links.forEach(l => {
                if (l.source.id === d.id) connectedNodes.add(l.target.id);
                if (l.target.id === d.id) connectedNodes.add(l.source.id);
            });
            
            // Highlight connected links
            link.classed('highlighted', l => 
                l.source.id === d.id || l.target.id === d.id
            );
            
            // Highlight connected nodes
            node.classed('highlighted', n => connectedNodes.has(n.id));
            
            // Show info panel
            const panel = document.getElementById('info-panel');
            const adj = adjacency[d.id] || {};
            const connectionList = Object.entries(adj)
                .filter(([word]) => nodeIds.has(word))
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10)
                .map(([word, count]) => `${word} (${count})`)
                .join(', ');
            
            document.getElementById('selected-word').textContent = d.id.toUpperCase();
            document.getElementById('connections').textContent = 
                connectionList || 'No filtered connections';
            panel.classList.add('visible');
        });
        
        node.on('mouseout', function() {
            node.classed('highlighted', false);
            link.classed('highlighted', false);
            document.getElementById('info-panel').classList.remove('visible');
        });
        
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
        
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }
        
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        
        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
        
        // Mode toggle
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const mode = btn.dataset.mode;
                if (mode === 'wall') {
                    document.getElementById('wall-view').classList.remove('hidden');
                    document.getElementById('network-view').classList.add('hidden');
                } else {
                    document.getElementById('wall-view').classList.add('hidden');
                    document.getElementById('network-view').classList.remove('hidden');
                    simulation.alpha(0.3).restart();
                }
            });
        });
    </script>
</body>
</html>
