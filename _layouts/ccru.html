<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | CCRU Notes</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-cyan: #0ff;
            --neon-magenta: #f0f;
            --neon-green: #0f0;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --text-color: #c0c0c0;
            --text-bright: #e0e0e0;
        }
        
        body {
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            background: var(--dark-bg);
            color: var(--text-color);
            min-height: 100vh;
            line-height: 1.7;
        }
        
        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
        }
        
        /* Glitch animation */
        @keyframes glitch {
            0%, 100% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-magenta); }
            25% { text-shadow: -2px 0 var(--neon-cyan), 2px 0 var(--neon-magenta); }
            50% { text-shadow: 2px 2px var(--neon-cyan), -2px -2px var(--neon-magenta); }
            75% { text-shadow: -2px 2px var(--neon-cyan), 2px -2px var(--neon-magenta); }
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            97% { opacity: 0.9; }
            98% { opacity: 1; }
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        header {
            border-bottom: 1px solid var(--neon-cyan);
            padding: 20px 0;
            margin-bottom: 40px;
            position: relative;
        }
        
        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: flicker 3s infinite;
        }
        
        .site-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: var(--neon-cyan);
            text-decoration: none;
            letter-spacing: 3px;
            animation: glitch 5s infinite;
        }
        
        .site-title:hover {
            color: var(--neon-magenta);
        }
        
        nav {
            margin-top: 15px;
        }
        
        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-right: 20px;
            font-size: 0.9em;
            letter-spacing: 1px;
            transition: color 0.3s, text-shadow 0.3s;
        }
        
        nav a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        
        /* Article */
        article {
            background: var(--darker-bg);
            border: 1px solid #1a1a2e;
            padding: 40px;
            position: relative;
        }
        
        article::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-green));
        }
        
        .post-meta {
            color: var(--neon-cyan);
            font-size: 0.85em;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .post-meta .week-num {
            background: var(--neon-magenta);
            color: var(--dark-bg);
            padding: 2px 8px;
            margin-right: 10px;
            font-weight: bold;
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2em;
            color: var(--text-bright);
            margin-bottom: 30px;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3em;
            color: var(--neon-cyan);
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        h3 {
            font-size: 1.1em;
            color: var(--neon-magenta);
            margin: 30px 0 15px;
        }
        
        p {
            margin-bottom: 20px;
        }
        
        a {
            color: var(--neon-cyan);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        
        a:hover {
            border-bottom-color: var(--neon-cyan);
        }
        
        blockquote {
            border-left: 3px solid var(--neon-magenta);
            padding-left: 20px;
            margin: 30px 0;
            font-style: italic;
            color: var(--text-bright);
            background: rgba(240, 0, 240, 0.05);
            padding: 20px;
        }
        
        code {
            font-family: 'Share Tech Mono', monospace;
            background: #1a1a2e;
            padding: 2px 6px;
            color: var(--neon-green);
        }
        
        pre {
            background: #1a1a2e;
            padding: 20px;
            overflow-x: auto;
            margin: 20px 0;
            border-left: 3px solid var(--neon-green);
        }
        
        pre code {
            background: none;
            padding: 0;
        }
        
        ul, ol {
            margin: 20px 0;
            padding-left: 25px;
        }
        
        li {
            margin-bottom: 10px;
        }
        
        li::marker {
            color: var(--neon-cyan);
        }
        
        /* Tags */
        .post-tags {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #1a1a2e;
        }
        
        .tag {
            display: inline-block;
            background: #1a1a2e;
            color: var(--neon-cyan);
            padding: 4px 12px;
            margin-right: 8px;
            font-size: 0.8em;
            letter-spacing: 1px;
            border: 1px solid var(--neon-cyan);
        }
        
        /* Footer */
        footer {
            margin-top: 60px;
            padding: 30px 0;
            border-top: 1px solid #1a1a2e;
            text-align: center;
            font-size: 0.85em;
            color: #666;
        }
        
        footer a {
            color: var(--neon-cyan);
        }
        
        /* Navigation between posts */
        .post-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #1a1a2e;
            font-size: 0.9em;
        }
        
        .post-nav a {
            color: var(--text-color);
        }
        
        .post-nav a:hover {
            color: var(--neon-cyan);
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            
            article {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .site-title {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/ccru/" class="site-title">CCRU_NOTES</a>
            <nav>
                <a href="/">HOME</a>
                <a href="/ccru/">INDEX</a>
                <a href="/blog.html">BLOG</a>
            </nav>
        </header>
        
        <article>
            <div class="post-meta">
                {% if page.week %}<span class="week-num">WEEK {{ page.week }}</span>{% endif %}
                <span>{{ page.date | date: "%Y.%m.%d" }}</span>
            </div>
            
            <h1>{{ page.title }}</h1>
            
            {{ content }}
            
            {% if page.tags %}
            <div class="post-tags">
                {% for tag in page.tags %}
                <span class="tag">{{ tag }}</span>
                {% endfor %}
            </div>
            {% endif %}
        </article>
        
        <footer>
            <p>[ <a href="/">CASEY TONKIN</a> ] // CCRU Course Notes // MSCP 2026</p>
        </footer>
    </div>
</body>
</html>
